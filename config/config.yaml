bot:
  command_prefix: "!"      # prefix for commands (e.g. !ping)
  admin_jids:              # list of admin phone numbers (e.g. "628xxx@s.whatsapp.net")
    - ""

session:
  driver: "sqlite"         # "sqlite" | "postgres"
  login_method: "qr"       # "qr" | "pair"
  phone_number: ""         # required if login_method is "pair" (e.g., "628123456789")
  sqlite:
    path: "data/session.db"
  postgres:
    dsn: "postgres://user:pass@localhost:5432/whatsbot?sslmode=disable"

log:
  level: "info"            # debug | info | warn | error
